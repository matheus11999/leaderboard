version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: brasilz-db
    restart: always
    environment:
      POSTGRES_USER: brasilz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: brasilz_portal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brasilz -d brasilz_portal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - brasilz

  api:
    build: ./api
    container_name: brasilz-api
    restart: always
    environment:
      DATABASE_URL: postgres://brasilz:${DB_PASSWORD}@db:5432/brasilz_portal
      INGEST_API_KEY: ${INGEST_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SERVER_BACKUP_DIR: /app/server-backups
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - ./backups/server-files:/app/server-backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brasilz

  db-backup:
    image: postgres:16-alpine
    container_name: brasilz-db-backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: brasilz
      POSTGRES_DB: brasilz_portal
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups/postgres:/backups
      - ./db/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    command: >
      sh -c "echo '0 8 * * * sh /usr/local/bin/backup-postgres.sh >> /backups/backup.log 2>&1' > /tmp/cron &&
             crontab /tmp/cron &&
             crond -f -l 8"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brasilz

  nginx:
    image: nginx:alpine
    container_name: brasilz-nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - brasilz
      - shared_proxy

volumes:
  pgdata:

networks:
  brasilz:
    driver: bridge
  shared_proxy:
    external: true
