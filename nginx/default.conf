# BrasilZ Leaderboard — nginx reverse proxy + frontend + admin panel static server.

upstream api {
  server api:3000;
}

# Rate limit ingest endpoint (server BrasilZ sends <100 req/min in normal load).
limit_req_zone $binary_remote_addr zone=ingest:10m rate=60r/s;

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 256k;
  root /usr/share/nginx/html;
  index index.html;

  # Ingest webhook — rate-limited, no static fallback.
  location /v1/arma/events {
    limit_req zone=ingest burst=200 nodelay;
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Public + admin API.
  location /api/ {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Admin panel — static SPA. Auth happens via /api/admin/login (JWT cookie).
  location /admin/ {
    alias /usr/share/nginx/html/admin/;
    try_files $uri $uri/ /admin/index.html;
  }

  # Public leaderboard root.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
