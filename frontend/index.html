<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayZ Brasil Reforger — Leaderboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* =================================================================
   TOKENS — pós-apocalíptico militar
   ================================================================= */
:root {
  --font-display: "Oswald", "Impact", sans-serif;
  --font-body: "Rajdhani", system-ui, sans-serif;
  --font-mono: "Share Tech Mono", "Courier New", monospace;

  --primary: #c1272d;
  --primary-glow: #ff3a40;

  --gold:   #c9a55c;
  --silver: #a6a195;
  --bronze: #b8743a;
}

:root[data-theme="dark"] {
  --bg:           #0a0907;
  --bg-2:         #110e0b;
  --surface:      #16130f;
  --surface-2:    #1d1915;
  --surface-3:    #25201b;
  --border:       #2a2520;
  --border-strong:#3d362e;
  --text:         #ece6d6;
  --text-muted:   #8c8275;
  --text-dim:     #5a544c;
  --text-very-dim:#3a342c;
  --border-bright:#4a4338;
  --shadow-deep:  0 4px 24px rgba(0,0,0,0.6);
  --grad-hero:    radial-gradient(ellipse at top, rgba(193,39,45,0.12), transparent 60%),
                  linear-gradient(180deg, #14110d 0%, #0a0907 100%);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
  min-height: 100vh;
  background-image:
    var(--grad-hero),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
}

button { font-family: inherit; cursor: pointer; }

/* =================================================================
   LAYOUT
   ================================================================= */
.app-grid {
  display: block;
  max-width: 1280px;
  margin: 0 auto;
}
.app-main {
  padding: 28px 32px 80px;
  min-width: 0;
}
@media (max-width: 720px) {
  .app-main { padding: 18px 14px 60px; }
}

/* =================================================================
   HEADER (kept for compat but hidden by hero-unified)
   ================================================================= */
.hdr, .fc { display: none !important; }

/* =================================================================
   HERO UNIFICADO (v2)
   ================================================================= */
.hero-unified {
  position: relative;
  margin-bottom: 0;
  padding: 26px 28px 32px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(193,39,45,0.18) 0%, transparent 55%),
    linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 60%, var(--bg-2) 100%);
  border: 1px solid var(--border);
  border-top: 2px solid var(--primary);
  overflow: hidden;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px));
}
.hero-unified::before, .hero-unified::after {
  content: "";
  position: absolute;
  top: 80px; bottom: 0; width: 1px;
  background: linear-gradient(180deg, var(--primary), transparent 80%);
  opacity: 0.35;
  pointer-events: none;
}
.hero-unified::before { left: 32%; }
.hero-unified::after  { right: 32%; }

.hero-u-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  padding-bottom: 22px;
  margin-bottom: 26px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 2;
  flex-wrap: wrap;
}
.hero-u-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.hero-u-online {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
}
.hero-u-online-num {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: #4ade80;
  letter-spacing: 0.04em;
}

.hero-u-period {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
}
.hero-u-period-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 8px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.14em;
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.hero-u-period-btn:last-child { border-right: none; }
.hero-u-period-btn:hover { color: var(--text); background: var(--surface); }
.hero-u-period-short { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
.hero-u-period-label { font-size: 13px; }
.hero-u-period-btn.is-active { background: var(--surface-2); color: var(--text); }
.hero-u-period-btn.is-active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--primary);
  box-shadow: 0 0 8px var(--primary);
}
.hero-u-period-btn.is-active .hero-u-period-short { color: var(--primary); }

.hero-u-mode {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
}
.hero-u-mode-btn {
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 10px 16px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.14em;
  cursor: pointer;
  transition: all 0.15s;
}
.hero-u-mode-btn:last-child { border-right: none; }
.hero-u-mode-btn:hover { color: var(--text); }
.hero-u-mode-btn.is-active { background: var(--primary); color: #fff; }

.hero-u-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 0;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.32em;
  color: var(--text-muted);
  position: relative;
  z-index: 2;
}
.hero-u-eyebrow-line { width: 56px; height: 1px; background: var(--border-strong); }

@media (max-width: 760px) {
  .hero-unified { padding: 20px 16px 28px; }
  .hero-u-top { flex-direction: column; align-items: flex-start; }
  .hero-u-controls { width: 100%; }
  .hero-u-period, .hero-u-mode { flex: 1; }
  .hero-u-period-btn, .hero-u-mode-btn { flex: 1; justify-content: center; }
}

/* Online dot pulse */
.hdr-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px #4ade80, 0 0 0 3px rgba(74,222,128,0.15);
  animation: pulse-green 1.8s infinite ease-in-out;
  flex-shrink: 0;
}
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 8px #4ade80, 0 0 0 3px rgba(74,222,128,0.15); }
  50%       { box-shadow: 0 0 12px #4ade80, 0 0 0 6px rgba(74,222,128,0.05); }
}

/* =================================================================
   HERO SECTION (wrapper ao redor do pódio)
   ================================================================= */
.hero {
  margin-bottom: 28px;
  padding: 32px 24px 40px;
  background:
    linear-gradient(180deg, rgba(193,39,45,0.04) 0%, transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  position: relative;
}
.hero::before, .hero::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--primary) 40%, var(--primary) 60%, transparent);
  opacity: 0.4;
}
.hero::before { left: 30%; }
.hero::after { right: 30%; }
.hero-inner { max-width: 980px; margin: 0 auto; }

/* =================================================================
   PÓDIO — pc-row cards
   ================================================================= */
.pc-row {
  display: grid;
  grid-template-columns: 1.18fr 1fr 1fr;
  gap: 12px;
  max-width: 1100px;
  margin: 0 auto;
  align-items: stretch;
}
@media (max-width: 860px) {
  .pc-row { grid-template-columns: 1fr; }
}

.pc {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  padding: 18px 18px 16px;
  background:
    linear-gradient(180deg, var(--surface-3) 0%, var(--surface-2) 50%, var(--surface) 100%);
  border: 1px solid var(--border-strong);
  border-bottom: 3px solid var(--border-strong);
  overflow: visible;
  min-height: 0;
  transition: transform 0.2s;
}
.pc:hover { transform: translateY(-2px); }

.pc-glow {
  position: absolute;
  top: -30px; right: -30px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, currentColor 0%, transparent 60%);
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}

/* Colors per place */
.pc.place-1 {
  border-color: var(--gold);
  border-bottom-color: var(--gold);
  background:
    linear-gradient(180deg, rgba(201,165,92,0.12) 0%, var(--surface-3) 30%, var(--surface-2) 100%);
  box-shadow:
    0 0 0 1px rgba(201,165,92,0.4),
    0 8px 24px rgba(201,165,92,0.18);
  color: var(--gold);
}
.pc.place-2 {
  border-color: var(--silver);
  border-bottom-color: var(--silver);
  color: var(--silver);
}
.pc.place-3 {
  border-color: var(--bronze);
  border-bottom-color: var(--bronze);
  color: var(--bronze);
}

.pc-crown {
  position: absolute;
  top: -36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  filter:
    drop-shadow(0 0 14px rgba(212,175,85,0.7))
    drop-shadow(0 6px 10px rgba(0,0,0,0.55));
  animation: pc-crown-float 4s ease-in-out infinite;
}
@keyframes pc-crown-float {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
  50%      { transform: translateX(-50%) translateY(-4px) rotate(2deg); }
}

/* Rank number */
.pc-rank {
  display: flex;
  align-items: flex-start;
  gap: 2px;
  line-height: 0.85;
  position: relative;
  z-index: 1;
}
.pc-rank-hash {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: currentColor;
  opacity: 0.55;
  margin-top: 8px;
}
.pc-rank-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 76px;
  line-height: 0.82;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  color: currentColor;
}
.pc.place-1 .pc-rank-num {
  font-size: 92px;
  background: linear-gradient(180deg, #f8e29c 0%, #d4af55 40%, #8a6a2f 80%, #b88a3a 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter:
    drop-shadow(0 0 16px rgba(201,165,92,0.6))
    drop-shadow(0 0 36px rgba(201,165,92,0.3))
    drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  animation: pc-rank-pulse 3.5s ease-in-out infinite;
}
@keyframes pc-rank-pulse {
  0%, 100% { filter: drop-shadow(0 0 16px rgba(201,165,92,0.6)) drop-shadow(0 0 36px rgba(201,165,92,0.3)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 24px rgba(201,165,92,0.85)) drop-shadow(0 0 56px rgba(201,165,92,0.45)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
}
.pc.place-2 .pc-rank-num {
  background: linear-gradient(180deg, #dddcd5 0%, #b8b1a0 50%, #6c685b 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(184,177,160,0.35)) drop-shadow(0 4px 8px rgba(0,0,0,0.45));
}
.pc.place-3 .pc-rank-num {
  background: linear-gradient(180deg, #e8a36a 0%, #b8743a 50%, #5e3a1c 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(184,116,58,0.45)) drop-shadow(0 4px 8px rgba(0,0,0,0.45));
}

/* Body */
.pc-body {
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  z-index: 1;
}
.pc-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.pc-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.28em;
  color: currentColor;
}
.pc-mvp {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--gold);
  border: 1px solid var(--gold);
  background: rgba(201,165,92,0.12);
  padding: 1px 6px;
}
.pc-nick {
  margin: 0 0 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: 0.01em;
  color: var(--text);
  line-height: 1.05;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.pc.place-1 .pc-nick {
  font-size: 22px;
  text-shadow: 0 0 20px rgba(201,165,92,0.45);
}

.pc-kills {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  border: 1px solid var(--border);
  border-left: 3px solid currentColor;
  min-width: 0;
}
.pc-kills-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  color: var(--text);
  letter-spacing: 0.005em;
  font-variant-numeric: tabular-nums;
  flex: 0 0 auto;
}
.pc.place-1 .pc-kills-num { font-size: 36px; text-shadow: 0 0 16px rgba(201,165,92,0.5); }
.pc-kills-lbl {
  display: flex;
  flex-direction: column;
  line-height: 0.95;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: currentColor;
  flex: 1 1 auto;
  min-width: 0;
  white-space: nowrap;
}
.pc-kills-lbl > span:last-child { font-weight: 700; font-size: 11px; color: var(--text); }

.pc-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin: 0;
}
.pc-stats > div {
  background: var(--surface);
  padding: 8px 6px;
  text-align: center;
}
.pc-stats dt {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
}
.pc-stats dd {
  margin: 3px 0 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.pc-stats dd.accent { color: var(--primary); }

@media (max-width: 480px) {
  .pc-rank-num { font-size: 64px !important; }
  .pc.place-1 .pc-rank-num { font-size: 76px !important; }
}

/* =================================================================
   HIGHLIGHTS (2-column grid)
   ================================================================= */
.highlights {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 28px;
}
@media (max-width: 720px) {
  .highlights { grid-template-columns: 1fr; }
}

/* Tiro mais longo */
.ls-card {
  position: relative;
  background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  padding: 18px 20px;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
}
.ls-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--primary);
  box-shadow: 0 0 14px var(--primary);
}
.ls-glow {
  position: absolute;
  top: -40px; right: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(193,39,45,0.22) 0%, transparent 65%);
  pointer-events: none;
}
.ls-head { margin-bottom: 12px; position: relative; z-index: 1; }
.ls-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.26em;
  color: var(--primary);
  margin-bottom: 4px;
}
.ls-eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 5px var(--primary);
  animation: pulse-red 1.6s infinite;
}
@keyframes pulse-red {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
.ls-head h3 { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: 0.02em; color: var(--text); line-height: 1; }

.ls-player {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin: 10px 0 12px;
  padding: 10px 12px 10px 14px;
  background: linear-gradient(90deg, rgba(193,39,45,0.10) 0%, transparent 100%);
  border: 1px solid rgba(193,39,45,0.25);
  border-left: 3px solid var(--primary);
}
.ls-player-l { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.ls-player-pre { display: flex; align-items: center; gap: 6px; font-family: var(--font-display); font-weight: 600; font-size: 9px; letter-spacing: 0.24em; color: var(--primary); }
.ls-player-pre-line { width: 14px; height: 1px; background: var(--primary); box-shadow: 0 0 4px var(--primary); }
.ls-player-nick { margin: 2px 0 3px; font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 0.95; color: var(--text); word-break: break-word; overflow-wrap: anywhere; text-shadow: 0 0 18px rgba(193,39,45,0.3); }
.ls-player-wpn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; color: var(--primary); background: var(--bg-2); border: 1px solid rgba(193,39,45,0.45); padding: 3px 8px; align-self: flex-start; }

.ls-distance { display: flex; align-items: stretch; gap: 10px; position: relative; z-index: 1; }
.ls-distance-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 66px;
  line-height: 0.86;
  color: var(--text);
  letter-spacing: -0.02em;
  text-shadow: 0 0 24px rgba(193,39,45,0.3);
  font-variant-numeric: tabular-nums;
}
.ls-distance-unit-wrap { display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 4px; }
.ls-distance-unit { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--primary); letter-spacing: 0.22em; }
.ls-distance-bar { display: block; width: 38px; height: 3px; background: var(--primary); margin-top: 4px; box-shadow: 0 0 8px var(--primary); }
.ls-trace { color: var(--primary); margin: 8px 0 0; position: relative; z-index: 1; }

/* Maior tempo vivo */
.hi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.hi-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--primary);
}
.hi-head { margin-bottom: 14px; }
.hi-eyebrow {
  display: inline-block;
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--primary);
  margin-bottom: 4px;
}
.hi-head h3 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.02em;
  color: var(--text);
  line-height: 1;
}
.hi-alive-time {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 14px;
}
.hi-alive-time > span {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.hi-alive-time b {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 54px;
  line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.hi-alive-time i {
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--primary);
}
.hi-alive-pulse {
  color: var(--primary);
  margin-bottom: 16px;
}
.hi-alive-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin: 0;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.hi-alive-meta dt {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
}
.hi-alive-meta dd {
  margin: 4px 0 0;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}

/* =================================================================
   TABELA
   ================================================================= */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px 0 4px;
  margin-bottom: 28px;
}
.table-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 24px 16px;
  border-bottom: 1px solid var(--border);
}
.table-head h2 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.18em;
  color: var(--text);
}
.table-head p {
  margin: 4px 0 0;
  font-size: 13px;
  color: var(--text-muted);
}
.table-mode-badge {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.24em;
  color: var(--primary);
  border: 1px solid var(--primary);
  padding: 6px 14px;
}

.table-wrap { overflow-x: auto; }
.ranktable {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.ranktable thead th {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  text-align: left;
  padding: 14px 12px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.ranktable thead th.col-num { text-align: right; }
.ranktable .col-rank { width: 60px; padding-left: 24px; }
.ranktable .col-nick { width: 30%; }

.ranktable tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.ranktable tbody tr:hover { background: var(--surface-2); }
.ranktable tbody tr:last-child { border-bottom: none; }
.ranktable td { padding: 14px 12px; }
.ranktable td.col-num { text-align: right; }
.ranktable td.mono {
  font-family: var(--font-mono);
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.04em;
}
.ranktable .col-rank { padding-left: 24px; }
.ranktable .col-num:last-child { padding-right: 24px; }

.rank-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 14px;
  min-width: 30px;
  text-align: center;
  padding: 4px 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.rank-pill.rank-1 { color: var(--gold);   border-color: var(--gold);   background: rgba(201,165,92,0.08); }
.rank-pill.rank-2 { color: var(--silver); border-color: var(--silver); background: rgba(166,161,149,0.08); }
.rank-pill.rank-3 { color: var(--bronze); border-color: var(--bronze); background: rgba(184,116,58,0.08); }

.nick {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--text);
}
.nick-tag {
  display: inline-block;
  margin-left: 8px;
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 6px;
  vertical-align: middle;
}

.accent { color: var(--primary) !important; }

/* =================================================================
   KILL FEED — toggle + painel colapsável
   ================================================================= */
.kf-toggle {
  position: fixed;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  z-index: 60;
  background: linear-gradient(180deg, var(--primary) 0%, #8a1a1f 100%);
  border: none;
  color: #fff;
  padding: 0;
  cursor: pointer;
  font-family: inherit;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    inset 0 -2px 0 rgba(0,0,0,0.25),
    -4px 0 20px rgba(193,39,45,0.45),
    -12px 0 40px rgba(0,0,0,0.5);
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s, right 0.3s ease;
  clip-path: polygon(0 14px, 16px 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 14px));
}
.kf-toggle:hover {
  transform: translateY(-50%) translateX(-6px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.25),
    -6px 0 30px rgba(193,39,45,0.75),
    -14px 0 50px rgba(0,0,0,0.6);
}
.kf-toggle.is-open { right: 380px; }
@media (max-width: 540px) { .kf-toggle.is-open { right: 92vw; } }
.kf-toggle.has-unread { animation: kf-bump 1.4s infinite; }
@keyframes kf-bump {
  0%, 100% { transform: translateY(-50%); }
  50%      { transform: translateY(-50%) translateX(-3px); }
}

.kf-toggle-inner {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "live  arrow"
    "title arrow";
  align-items: center;
  gap: 4px 12px;
  padding: 12px 16px 12px 18px;
  min-width: 130px;
}
.kf-toggle-live {
  grid-area: live;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: rgba(255,255,255,0.92);
}
.kf-toggle-dot {
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 10px #fff, 0 0 0 3px rgba(255,255,255,0.18);
  animation: pulse-white 1.2s infinite;
}
@keyframes pulse-white {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
.kf-toggle-title {
  grid-area: title;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  line-height: 0.9;
  letter-spacing: 0.025em;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.kf-toggle-title em { font-style: normal; opacity: 0.85; font-weight: 600; }
.kf-toggle-arrow {
  grid-area: arrow;
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 44px;
  background: rgba(0,0,0,0.25);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.22);
}
.kf-toggle-badge {
  position: absolute;
  top: -10px; left: -12px;
  background: #fff;
  color: var(--primary);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  padding: 4px 9px;
  border-radius: 99px;
  box-shadow: 0 0 12px rgba(255,255,255,0.65), 0 0 0 2px var(--primary), 0 2px 6px rgba(0,0,0,0.4);
  min-width: 28px;
  text-align: center;
  animation: kf-badge-pop 0.4s ease;
  letter-spacing: 0.02em;
  z-index: 2;
}
@keyframes kf-badge-pop {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.kf-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 55;
  animation: kf-overlay-in 0.2s ease;
}
@keyframes kf-overlay-in { from { opacity: 0; } to { opacity: 1; } }

.kf-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 380px;
  height: 100vh;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
  border-left: 1px solid var(--primary);
  box-shadow: -1px 0 0 rgba(193,39,45,0.4), -20px 0 60px rgba(0,0,0,0.5);
  z-index: 58;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.kf-panel.is-open { transform: translateX(0); }
@media (max-width: 540px) { .kf-panel { width: 92vw; } }

.kf-hdr { padding: 18px 22px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
.kf-hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.kf-hdr-right { display: flex; align-items: center; gap: 12px; }
.kf-live { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.24em; color: var(--primary); }
.kf-live-dot { width: 9px; height: 9px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: pulse-red 1.2s infinite; }
.kf-counter { display: flex; align-items: baseline; gap: 4px; }
.kf-counter-pre { font-family: var(--font-display); font-weight: 500; font-size: 9px; letter-spacing: 0.22em; color: var(--text-dim); margin-right: 4px; }
.kf-counter-num { font-family: var(--font-mono); font-size: 14px; color: var(--text); }
.kf-counter-unit { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.kf-close {
  background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted);
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.kf-close:hover { color: var(--text); border-color: var(--primary); background: rgba(193,39,45,0.12); }

.kf-title { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: 0.02em; color: var(--text); line-height: 0.95; }
.kf-title-acc { color: var(--primary); font-size: 20px; opacity: 0.7; margin-left: 6px; }
.kf-sub { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); }
.kf-sub-sep { width: 3px; height: 3px; background: var(--text-dim); border-radius: 50%; }

.kf-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 6px 0; }
.kf-list::-webkit-scrollbar { width: 4px; }
.kf-list::-webkit-scrollbar-thumb { background: var(--border-strong); }

.kf-row { display: flex; gap: 12px; padding: 12px 18px; transition: background 0.2s; border-top: 1px solid var(--border); }
.kf-row:first-child { border-top: none; }
.kf-row:hover { background: rgba(193,39,45,0.03); }
.kf-row.kf-new { animation: kf-flash 1.8s ease-out; }
@keyframes kf-flash {
  0% { background: rgba(193,39,45,0.32); transform: translateX(-12px); opacity: 0; }
  18% { transform: translateX(0); opacity: 1; }
  100% { background: transparent; }
}

.kf-rail { display: flex; flex-direction: column; align-items: center; padding-top: 6px; width: 12px; }
.kf-rail-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); border: 1px solid var(--border-strong); }
.kf-row.pvp .kf-rail-dot { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 6px var(--primary); }
.kf-row.pve .kf-rail-dot { background: #84cc16; border-color: #84cc16; box-shadow: 0 0 6px #84cc16; }
.kf-rail-line { flex: 1; width: 1px; background: linear-gradient(180deg, var(--border-strong), transparent); margin-top: 4px; }

.kf-body { flex: 1; min-width: 0; }
.kf-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.kf-time { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text-dim); }
.kf-tag { font-family: var(--font-display); font-weight: 600; font-size: 9px; letter-spacing: 0.2em; padding: 1px 5px; border: 1px solid; }
.kf-tag.pvp { color: var(--primary); border-color: rgba(193,39,45,0.55); }
.kf-tag.pve { color: #84cc16; border-color: rgba(132,204,22,0.55); }
.kf-hs { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 9px; color: #f5c842; }

.kf-dist-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  background-color: rgba(255,255,255,0.02);
  border: 1px solid currentColor;
  border-left: 2px solid currentColor;
  font-family: var(--font-mono);
  font-size: 10px;
}
.kf-dist-icon { display: flex; opacity: 0.85; }
.kf-dist-num { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--text); letter-spacing: 0.02em; }
.kf-dist-num i { font-style: normal; font-family: var(--font-mono); font-size: 9px; color: currentColor; margin-left: 1px; opacity: 0.75; }

.kf-dist-badge.tier-close   { color: #8c8275; }
.kf-dist-badge.tier-mid     { color: #84cc16; background-color: rgba(132,204,22,0.08); }
.kf-dist-badge.tier-long    { color: #f5c842; background-color: rgba(245,200,66,0.10); }
.kf-dist-badge.tier-extreme { color: var(--primary); background-color: rgba(193,39,45,0.12); }

.kf-line { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; font-family: var(--font-display); font-weight: 600; font-size: 13px; line-height: 1.1; }
.kf-killer { color: var(--text); }
.kf-wpn { display: inline-flex; align-items: center; gap: 4px; color: var(--primary); padding: 2px 6px; background: rgba(193,39,45,0.10); border: 1px solid rgba(193,39,45,0.35); font-family: var(--font-mono); font-size: 9px; font-weight: 500; }
.kf-victim { color: var(--text-muted); }
.kf-victim.is-npc { color: #84cc16; }

.kf-foot { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-family: var(--font-mono); font-size: 9px; }
.kf-tier { display: inline-block; padding: 1px 6px; font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.22em; background: rgba(255,255,255,0.02); border: 1px solid currentColor; }
.kf-tier.tier-close   { color: #8c8275; }
.kf-tier.tier-mid     { color: #84cc16; }
.kf-tier.tier-long    { color: #f5c842; }
.kf-tier.tier-extreme { color: var(--primary); animation: pulse-red 1.5s infinite; }

.kf-foot-bar { display: flex; justify-content: space-between; align-items: center; padding: 11px 20px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); background: var(--bg-2); }
.kf-foot-l { display: inline-flex; align-items: center; gap: 8px; }
.kf-foot-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 6px var(--primary); }

/* =================================================================
   FOOTER
   ================================================================= */
.page-foot {
  text-align: center;
  padding: 30px 0 10px;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
}
.page-foot-line {
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.page-foot-dot {
  width: 4px; height: 4px;
  background: var(--text-dim);
  border-radius: 50%;
}

/* =================================================================
   RESPONSIVE
   ================================================================= */
@media (max-width: 720px) {
  .table-head { flex-direction: column; align-items: flex-start; gap: 10px; }
  .ranktable th, .ranktable td { padding: 10px 8px; font-size: 13px; }
  .col-rank { padding-left: 12px !important; }
  .col-num:last-child { padding-right: 12px !important; }
}
</style>
</head>
