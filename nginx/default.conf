# BrasilZ Leaderboard — reverse proxy.
# HTTP-only initial setup. Add TLS later by mounting certs in nginx/ssl/.

upstream api {
  server api:3000;
}

# Rate limit ingest endpoint (server BrasilZ sends <100 req/min in normal load).
limit_req_zone $binary_remote_addr zone=ingest:10m rate=60r/s;

server {
  listen 80;
  server_name _;

  client_max_body_size 256k;

  # Ingest webhook — rate-limited.
  location /v1/arma/events {
    limit_req zone=ingest burst=200 nodelay;
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Public + admin API.
  location / {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
