<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayZ Brasil Reforger — Leaderboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* =================================================================
   TOKENS — pós-apocalíptico militar
   ================================================================= */
:root {
  --font-display: "Oswald", "Impact", sans-serif;
  --font-body: "Rajdhani", system-ui, sans-serif;
  --font-mono: "Share Tech Mono", "Courier New", monospace;

  --primary: #c1272d;
  --primary-glow: #ff3a40;

  --gold:   #c9a55c;
  --silver: #a6a195;
  --bronze: #b8743a;
}

:root[data-theme="dark"] {
  --bg:           #0a0907;
  --bg-2:         #110e0b;
  --surface:      #16130f;
  --surface-2:    #1d1915;
  --surface-3:    #25201b;
  --border:       #2a2520;
  --border-strong:#3d362e;
  --text:         #ece6d6;
  --text-muted:   #8c8275;
  --text-dim:     #5a544c;
  --text-very-dim:#3a342c;
  --border-bright:#4a4338;
  --shadow-deep:  0 4px 24px rgba(0,0,0,0.6);
  --grad-hero:    radial-gradient(ellipse at top, rgba(193,39,45,0.12), transparent 60%),
                  linear-gradient(180deg, #14110d 0%, #0a0907 100%);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
  min-height: 100vh;
  background-image:
    var(--grad-hero),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
}

button { font-family: inherit; cursor: pointer; }

/* =================================================================
   LAYOUT
   ================================================================= */
.app-grid {
  display: block;
  max-width: 1280px;
  margin: 0 auto;
}
.app-main {
  padding: 28px 32px 80px;
  min-width: 0;
}
@media (max-width: 720px) {
  .app-main { padding: 18px 14px 60px; }
}

/* =================================================================
   HEADER (kept for compat but hidden by hero-unified)
   ================================================================= */
.hdr, .fc { display: none !important; }

/* =================================================================
   HERO UNIFICADO (v3)
   ================================================================= */
.hero-unified {
  position: relative;
  margin-bottom: 0;
  padding: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(193,39,45,0.20) 0%, transparent 52%),
    radial-gradient(ellipse at 0% 100%, rgba(193,39,45,0.07) 0%, transparent 40%),
    linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 50%, var(--bg-2) 100%);
  border: 1px solid var(--border);
  border-top: 2px solid var(--primary);
  overflow: hidden;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px));
}
.hero-unified::before, .hero-unified::after {
  content: "";
  position: absolute;
  top: 100px; bottom: 0; width: 1px;
  background: linear-gradient(180deg, var(--primary), transparent 75%);
  opacity: 0.28;
  pointer-events: none;
}
.hero-unified::before { left: 33%; }
.hero-unified::after  { right: 33%; }

/* ── Top bar ─────────────────────────────────────────────────────── */
.hu2-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  padding: 20px 28px 18px;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 2;
  flex-wrap: wrap;
}

/* ── Brand ───────────────────────────────────────────────────────── */
.hdr-brand { display: flex; align-items: center; gap: 18px; }
.hdr-logo {
  color: var(--primary);
  width: 64px; height: 64px;
  flex-shrink: 0;
  position: relative;
  background:
    radial-gradient(circle at 30% 25%, rgba(193,39,45,0.45) 0%, transparent 55%),
    linear-gradient(135deg, var(--surface-3) 0%, var(--bg) 100%);
  border: 1px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  box-shadow:
    inset 0 0 0 1px rgba(193,39,45,0.18),
    inset 0 0 32px rgba(193,39,45,0.25),
    0 8px 20px rgba(0,0,0,0.55),
    0 0 32px rgba(193,39,45,0.28);
}
.hdr-logo::before {
  content: "";
  position: absolute;
  top: 5px; left: 5px;
  width: 12px; height: 2px;
  background: var(--primary);
  box-shadow: 0 0 6px var(--primary);
}
.hdr-logo::after {
  content: "";
  position: absolute;
  bottom: 5px; right: 5px;
  width: 12px; height: 2px;
  background: var(--primary);
  box-shadow: 0 0 6px var(--primary);
}
.hdr-name-line1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 32px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
  text-shadow: 0 0 28px rgba(193,39,45,0.3);
}
.hdr-name-line2 {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.24em;
  color: var(--text-muted);
  margin-top: 5px;
}
.hdr-divider { width: 18px; height: 1px; background: var(--border-strong); }
.hdr-tag { color: var(--primary); letter-spacing: 0.26em; }

/* ── Server stats strip ──────────────────────────────────────────── */
.hu2-stats-strip {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(0,0,0,0.28);
  border: 1px solid var(--border-strong);
  clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
}
.hu2-stat {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 22px;
}
.hu2-stat-online { padding-left: 18px; }
.hu2-stat-body {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.hu2-stat-val {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  line-height: 1;
  color: var(--text);
  letter-spacing: 0.02em;
}
.hu2-stat-frac {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}
.hu2-stat-lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.hu2-clock {
  font-family: var(--font-mono) !important;
  font-size: 18px !important;
  color: var(--primary) !important;
  letter-spacing: 0.06em;
}
.hu2-stat-sep {
  width: 1px;
  height: 36px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── Controls bar ────────────────────────────────────────────────── */
.hu2-controls {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.12);
  position: relative;
  z-index: 2;
  flex-wrap: wrap;
}
.hu2-period-group, .hu2-mode-group {
  display: flex;
  align-items: center;
  gap: 12px;
}
.hu2-ctrl-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-very-dim);
  flex-shrink: 0;
}
.hu2-mode-icon {
  font-size: 12px;
  margin-right: 2px;
  opacity: 0.85;
}

/* ── Period + mode buttons (reused classes) ──────────────────────── */
.hero-u-period {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
}
.hero-u-period-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 8px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.14em;
  border-right: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.hero-u-period-btn:last-child { border-right: none; }
.hero-u-period-btn:hover { color: var(--text); background: var(--surface); }
.hero-u-period-short { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
.hero-u-period-label { font-size: 12px; }
.hero-u-period-btn.is-active { background: var(--surface-2); color: var(--text); }
.hero-u-period-btn.is-active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--primary);
  box-shadow: 0 0 8px var(--primary);
}
.hero-u-period-btn.is-active .hero-u-period-short { color: var(--primary); }

.hero-u-mode {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
}
.hero-u-mode-btn {
  background: transparent;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  padding: 9px 20px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.18em;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.hero-u-mode-btn:last-child { border-right: none; }
.hero-u-mode-btn:hover { color: var(--text); background: var(--surface); }
.hero-u-mode-btn.is-active {
  background: var(--primary);
  color: #fff;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1), 0 0 18px rgba(193,39,45,0.4);
}

/* ── Eyebrow divider before podium ───────────────────────────────── */
.hero-u-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px 28px 0;
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.36em;
  color: var(--text-dim);
  position: relative;
  z-index: 2;
}
.hero-u-eyebrow-line {
  flex: 1;
  max-width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-strong));
}
.hero-u-eyebrow-line:last-child {
  background: linear-gradient(90deg, var(--border-strong), transparent);
}

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 860px) {
  .hu2-topbar { padding: 16px 16px 14px; gap: 14px; }
  .hu2-controls { padding: 12px 16px; gap: 16px; }
  .hu2-stats-strip { flex-wrap: wrap; clip-path: none; border-radius: 2px; }
  .hdr-name-line1 { font-size: 26px; }
  .hdr-logo { width: 52px; height: 52px; }
}
@media (max-width: 580px) {
  .hu2-stats-strip { display: none; }
  .hero-u-period-btn { padding: 7px 12px; }
  .hero-u-mode-btn { padding: 8px 14px; font-size: 12px; }
}

/* Online dot pulse */
.hdr-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 10px #4ade80, 0 0 0 3px rgba(74,222,128,0.15);
  animation: pulse-green 1.8s infinite ease-in-out;
  flex-shrink: 0;
}
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 10px #4ade80, 0 0 0 3px rgba(74,222,128,0.15); }
  50%       { box-shadow: 0 0 16px #4ade80, 0 0 0 6px rgba(74,222,128,0.05); }
}
.hu2-stat-online .hu2-stat-val { color: #4ade80; }

/* =================================================================
   HERO SECTION (wrapper ao redor do pódio)
   ================================================================= */
.hero {
  margin-bottom: 28px;
  padding: 32px 24px 40px;
  background:
    linear-gradient(180deg, rgba(193,39,45,0.04) 0%, transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  position: relative;
}
.hero::before, .hero::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, var(--primary) 40%, var(--primary) 60%, transparent);
  opacity: 0.4;
}
.hero::before { left: 30%; }
.hero::after { right: 30%; }
.hero-inner { max-width: 980px; margin: 0 auto; }

/* =================================================================
   PÓDIO — pc-row cards
   ================================================================= */
.pc-row {
  display: grid;
  grid-template-columns: 1.18fr 1fr 1fr;
  gap: 12px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 28px 28px;
  align-items: stretch;
}
@media (max-width: 860px) {
  .pc-row { grid-template-columns: 1fr; }
}

.pc {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  padding: 18px 18px 16px;
  background:
    linear-gradient(180deg, var(--surface-3) 0%, var(--surface-2) 50%, var(--surface) 100%);
  border: 1px solid var(--border-strong);
  border-bottom: 3px solid var(--border-strong);
  overflow: visible;
  min-height: 0;
  transition: transform 0.2s;
}
.pc:hover { transform: translateY(-2px); }

.pc-glow {
  position: absolute;
  top: -30px; right: -30px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, currentColor 0%, transparent 60%);
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}

/* Colors per place */
.pc.place-1 {
  border-color: var(--gold);
  border-bottom-color: var(--gold);
  background:
    linear-gradient(180deg, rgba(201,165,92,0.12) 0%, var(--surface-3) 30%, var(--surface-2) 100%);
  box-shadow:
    0 0 0 1px rgba(201,165,92,0.4),
    0 8px 24px rgba(201,165,92,0.18);
  color: var(--gold);
}
.pc.place-2 {
  border-color: var(--silver);
  border-bottom-color: var(--silver);
  color: var(--silver);
}
.pc.place-3 {
  border-color: var(--bronze);
  border-bottom-color: var(--bronze);
  color: var(--bronze);
}

.pc-crown {
  position: absolute;
  top: -36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  filter:
    drop-shadow(0 0 14px rgba(212,175,85,0.7))
    drop-shadow(0 6px 10px rgba(0,0,0,0.55));
  animation: pc-crown-float 4s ease-in-out infinite;
}
@keyframes pc-crown-float {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
  50%      { transform: translateX(-50%) translateY(-4px) rotate(2deg); }
}

/* Rank number */
.pc-rank {
  display: flex;
  align-items: flex-start;
  gap: 2px;
  line-height: 0.85;
  position: relative;
  z-index: 1;
}
.pc-rank-hash {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  color: currentColor;
  opacity: 0.55;
  margin-top: 8px;
}
.pc-rank-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 76px;
  line-height: 0.82;
  letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  color: currentColor;
}
.pc.place-1 .pc-rank-num {
  font-size: 92px;
  background: linear-gradient(180deg, #f8e29c 0%, #d4af55 40%, #8a6a2f 80%, #b88a3a 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter:
    drop-shadow(0 0 16px rgba(201,165,92,0.6))
    drop-shadow(0 0 36px rgba(201,165,92,0.3))
    drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  animation: pc-rank-pulse 3.5s ease-in-out infinite;
}
@keyframes pc-rank-pulse {
  0%, 100% { filter: drop-shadow(0 0 16px rgba(201,165,92,0.6)) drop-shadow(0 0 36px rgba(201,165,92,0.3)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 24px rgba(201,165,92,0.85)) drop-shadow(0 0 56px rgba(201,165,92,0.45)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
}
.pc.place-2 .pc-rank-num {
  background: linear-gradient(180deg, #dddcd5 0%, #b8b1a0 50%, #6c685b 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(184,177,160,0.35)) drop-shadow(0 4px 8px rgba(0,0,0,0.45));
}
.pc.place-3 .pc-rank-num {
  background: linear-gradient(180deg, #e8a36a 0%, #b8743a 50%, #5e3a1c 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(184,116,58,0.45)) drop-shadow(0 4px 8px rgba(0,0,0,0.45));
}

/* Body */
.pc-body {
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  z-index: 1;
}
.pc-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.pc-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.28em;
  color: currentColor;
}
.pc-mvp {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--gold);
  border: 1px solid var(--gold);
  background: rgba(201,165,92,0.12);
  padding: 1px 6px;
}
.pc-nick {
  margin: 0 0 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: 0.01em;
  color: var(--text);
  line-height: 1.05;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.pc.place-1 .pc-nick {
  font-size: 22px;
  text-shadow: 0 0 20px rgba(201,165,92,0.45);
}

.pc-kills {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 100%);
  border: 1px solid var(--border);
  border-left: 3px solid currentColor;
  min-width: 0;
}
.pc-kills-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  color: var(--text);
  letter-spacing: 0.005em;
  font-variant-numeric: tabular-nums;
  flex: 0 0 auto;
}
.pc.place-1 .pc-kills-num { font-size: 36px; text-shadow: 0 0 16px rgba(201,165,92,0.5); }
.pc-kills-lbl {
  display: flex;
  flex-direction: column;
  line-height: 0.95;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: currentColor;
  flex: 1 1 auto;
  min-width: 0;
  white-space: nowrap;
}
.pc-kills-lbl > span:last-child { font-weight: 700; font-size: 11px; color: var(--text); }

.pc-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin: 0;
}
.pc-stats > div {
  background: var(--surface);
  padding: 8px 6px;
  text-align: center;
}
.pc-stats dt {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
}
.pc-stats dd {
  margin: 3px 0 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.pc-stats dd.accent { color: var(--primary); }

@media (max-width: 480px) {
  .pc-rank-num { font-size: 64px !important; }
  .pc.place-1 .pc-rank-num { font-size: 76px !important; }
}

/* =================================================================
   HIGHLIGHTS (3-column grid)
   ================================================================= */
.highlights {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
@media (max-width: 1080px) {
  .highlights { grid-template-columns: 1fr 1fr; }
  .hu-card { grid-column: 1 / -1; }
}
@media (max-width: 720px) {
  .highlights { grid-template-columns: 1fr; }
  .hu-card { grid-column: auto; }
}

/* Tiro mais longo */
.ls-card {
  position: relative;
  background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  padding: 18px 20px;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
}
.ls-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--primary);
  box-shadow: 0 0 14px var(--primary);
}
.ls-glow {
  position: absolute;
  top: -40px; right: -40px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(193,39,45,0.22) 0%, transparent 65%);
  pointer-events: none;
}
.ls-head { margin-bottom: 12px; position: relative; z-index: 1; }
.ls-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.26em;
  color: var(--primary);
  margin-bottom: 4px;
}
.ls-eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 5px var(--primary);
  animation: pulse-red 1.6s infinite;
}
@keyframes pulse-red {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
.ls-head h3 { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: 0.02em; color: var(--text); line-height: 1; }

.ls-player {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin: 10px 0 12px;
  padding: 10px 12px 10px 14px;
  background: linear-gradient(90deg, rgba(193,39,45,0.10) 0%, transparent 100%);
  border: 1px solid rgba(193,39,45,0.25);
  border-left: 3px solid var(--primary);
}
.ls-player-l { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.ls-player-pre { display: flex; align-items: center; gap: 6px; font-family: var(--font-display); font-weight: 600; font-size: 9px; letter-spacing: 0.24em; color: var(--primary); }
.ls-player-pre-line { width: 14px; height: 1px; background: var(--primary); box-shadow: 0 0 4px var(--primary); }
.ls-player-nick { margin: 2px 0 3px; font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 0.95; color: var(--text); word-break: break-word; overflow-wrap: anywhere; text-shadow: 0 0 18px rgba(193,39,45,0.3); }
.ls-player-wpn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; color: var(--primary); background: var(--bg-2); border: 1px solid rgba(193,39,45,0.45); padding: 3px 8px; align-self: flex-start; }

.ls-distance { display: flex; align-items: stretch; gap: 10px; position: relative; z-index: 1; }
.ls-distance-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 66px;
  line-height: 0.86;
  color: var(--text);
  letter-spacing: -0.02em;
  text-shadow: 0 0 24px rgba(193,39,45,0.3);
  font-variant-numeric: tabular-nums;
}
.ls-distance-unit-wrap { display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 4px; }
.ls-distance-unit { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--primary); letter-spacing: 0.22em; }
.ls-distance-bar { display: block; width: 38px; height: 3px; background: var(--primary); margin-top: 4px; box-shadow: 0 0 8px var(--primary); }
.ls-trace { color: var(--primary); margin: 8px 0 0; position: relative; z-index: 1; }

/* Maior tempo vivo */
.hi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.hi-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--primary);
}
.hi-head { margin-bottom: 14px; }
.hi-eyebrow {
  display: inline-block;
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--primary);
  margin-bottom: 4px;
}
.hi-head h3 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.02em;
  color: var(--text);
  line-height: 1;
}
.hi-alive-time {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 14px;
}
.hi-alive-time > span {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.hi-alive-time b {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 54px;
  line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.hi-alive-time i {
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--primary);
}
.hi-alive-pulse {
  color: var(--primary);
  margin-bottom: 16px;
}
.hi-alive-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  margin: 0;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.hi-alive-meta dt {
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
}
.hi-alive-meta dd {
  margin: 4px 0 0;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}

/* =================================================================
   HUNT CARD (Caçada / Bounty)
   ================================================================= */
.hu-card {
  position: relative;
  overflow: hidden;
}
.hu-card.hu-active {
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 1px var(--primary), 0 0 30px rgba(193,39,45,0.45), inset 0 0 60px rgba(193,39,45,0.08) !important;
  background: linear-gradient(180deg, rgba(193,39,45,0.08) 0%, var(--surface-2) 30%, var(--surface) 100%) !important;
  animation: hu-card-pulse 2.4s ease-in-out infinite;
}
@keyframes hu-card-pulse {
  0%, 100% { box-shadow: 0 0 0 1px var(--primary), 0 0 30px rgba(193,39,45,0.45), inset 0 0 60px rgba(193,39,45,0.08); }
  50%      { box-shadow: 0 0 0 1px var(--primary), 0 0 48px rgba(193,39,45,0.65), inset 0 0 80px rgba(193,39,45,0.12); }
}
.hu-card.hu-active::before { background: var(--primary) !important; box-shadow: 0 0 18px var(--primary), 0 0 36px rgba(193,39,45,0.6) !important; width: 4px !important; }
.hu-card.hu-ended { opacity: 0.85; border-color: var(--border-strong) !important; }
.hu-card.hu-ended::before { background: var(--text-dim) !important; box-shadow: none !important; }
.hu-glow { background: radial-gradient(circle, rgba(193,39,45,0.30) 0%, transparent 65%) !important; width: 280px !important; height: 280px !important; top: -60px !important; right: -60px !important; }
.hu-scan { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, transparent 0%, rgba(193,39,45,0.18) 50%, transparent 100%); height: 80px; width: 100%; animation: hu-scan-anim 3s linear infinite; opacity: 0.6; }
@keyframes hu-scan-anim { 0% { top: -80px; opacity: 0; } 20% { opacity: 0.6; } 80% { opacity: 0.6; } 100% { top: 100%; opacity: 0; } }
.hu-eyebrow { color: var(--primary) !important; font-weight: 700 !important; }
.hu-card .ls-head h3 { color: var(--text) !important; text-shadow: 0 0 16px rgba(193,39,45,0.4); }
.hu-ended .ls-head h3 { text-shadow: none; color: var(--text-muted) !important; }
.hu-ended .hu-eyebrow { color: var(--text-muted) !important; }
.hu-head { position: relative; padding-right: 132px; }
.hu-view-btn {
  position: absolute;
  right: 0;
  top: 0;
  min-height: 30px;
  padding: 6px 10px;
  background: rgba(193,39,45,0.10);
  border: 1px solid rgba(193,39,45,0.42);
  color: var(--text);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.hu-view-btn:hover { background: rgba(193,39,45,0.20); border-color: var(--primary); color: #fff; }

.hu-hero { display: flex; align-items: stretch; gap: 14px; margin: 10px 0 12px; position: relative; z-index: 1; }
.hu-streak-block { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 6px 14px 6px 0; border-right: 2px solid var(--primary); }
.hu-ended .hu-streak-block { border-right-color: var(--border-strong); }
.hu-streak-big {
  font-family: var(--font-display); font-weight: 700; font-size: 84px; line-height: 0.82; letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums;
  background: linear-gradient(180deg, #ff6970 0%, var(--primary) 50%, #7a1419 100%);
  background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 18px rgba(193,39,45,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  animation: hu-streak-pulse 2.4s ease-in-out infinite;
}
.hu-ended .hu-streak-big {
  background: linear-gradient(180deg, #8a8275 0%, #5a544c 50%, #2a2520 100%);
  background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); animation: none;
}
@keyframes hu-streak-pulse {
  0%, 100% { filter: drop-shadow(0 0 18px rgba(193,39,45,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 28px rgba(193,39,45,0.85)) drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
}
.hu-streak-meta { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
.hu-streak-bar { width: 32px; height: 3px; background: var(--primary); box-shadow: 0 0 8px var(--primary); }
.hu-ended .hu-streak-bar { background: var(--text-dim); box-shadow: none; }
.hu-streak-lbl-big { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; color: var(--primary); max-width: 80px; line-height: 1.1; }
.hu-ended .hu-streak-lbl-big { color: var(--text-muted); }
.hu-hunter { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
.hu-hunter-pre { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.26em; color: var(--primary); }
.hu-hunter-pre-dot { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 1s infinite; }
.hu-ended .hu-hunter-pre { color: var(--text-muted); }
.hu-ended .hu-hunter-pre-dot { background: var(--text-muted); box-shadow: none; animation: none; }
.hu-status-pill { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.22em; padding: 2px 7px; border: 1px solid currentColor; margin-left: auto; }
.hu-status-pill.is-active { color: #fff; background: var(--primary); border-color: var(--primary); box-shadow: 0 0 12px rgba(193,39,45,0.55); animation: pulse 1.4s infinite; }
.hu-status-pill.is-ended { color: var(--text-dim); }
.hu-hunter-nick { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 24px; line-height: 1; color: var(--text); letter-spacing: 0.005em; text-shadow: 0 0 20px rgba(193,39,45,0.45); word-break: break-word; overflow-wrap: anywhere; }
.hu-ended .hu-hunter-nick { text-shadow: none; color: var(--text-muted); }
.hu-bounty { position: relative; z-index: 1; display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: linear-gradient(90deg, rgba(212,168,71,0.18) 0%, rgba(212,168,71,0.04) 70%, transparent 100%); border: 1px solid rgba(212,168,71,0.42); border-left: 3px solid var(--gold); margin-bottom: 4px; }
.hu-bounty-icon { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--gold); line-height: 1; text-shadow: 0 0 10px rgba(212,168,71,0.7); width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); border: 1px solid var(--gold); border-radius: 50%; flex: 0 0 auto; padding-bottom: 2px; }
.hu-bounty-text { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.hu-bounty-lbl { font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.26em; color: var(--gold); }
.hu-bounty-val { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: var(--text); line-height: 0.95; letter-spacing: -0.005em; font-variant-numeric: tabular-nums; text-shadow: 0 0 14px rgba(212,168,71,0.4); }
.hu-ender { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-strong); position: relative; z-index: 1; }
.hu-ender-pre { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.26em; color: var(--text-dim); margin-bottom: 6px; }
.hu-ender-line { width: 14px; height: 1px; background: var(--text-dim); }
.hu-ender-body { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.hu-ender-nick { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
.hu-ender-wpn { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; color: var(--primary); background: rgba(193,39,45,0.10); border: 1px solid rgba(193,39,45,0.35); padding: 2px 6px; }
.hu-ender-dist { font-family: var(--font-mono); font-size: 11px; color: var(--text); font-weight: 500; }
.hu-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border-strong); position: relative; z-index: 1; margin-top: 6px; }
.hu-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; padding: 10px 12px; background: var(--surface); }
.hu-row-active { background: linear-gradient(90deg, rgba(193,39,45,0.14) 0%, var(--surface) 80%) !important; border-left: 3px solid var(--primary); }
.hu-row-ended { opacity: 0.7; }
.hu-row-streak-col { display: flex; flex-direction: column; align-items: center; min-width: 50px; padding: 4px 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-strong); }
.hu-row-active .hu-row-streak-col { background: rgba(193,39,45,0.18); border-color: var(--primary); box-shadow: 0 0 10px rgba(193,39,45,0.3); }
.hu-row-streak-num { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
.hu-row-active .hu-row-streak-num { color: var(--primary); text-shadow: 0 0 8px var(--primary); }
.hu-row-streak-lbl { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; color: var(--text-dim); margin-top: 1px; }
.hu-row-mid { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.hu-row-nick { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: 0.02em; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
.hu-row-status { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.2em; padding: 1px 6px; border: 1px solid currentColor; align-self: flex-start; }
.hu-row-status.status-active { color: #fff; background: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px rgba(193,39,45,0.5); animation: pulse 1.4s infinite; }
.hu-row-status.status-ended { color: var(--text-dim); }
.hu-row-bounty { display: inline-flex; align-items: center; gap: 4px; }
.hu-row-bounty-icon { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--gold); text-shadow: 0 0 6px rgba(212,168,71,0.6); }
.hu-row-bounty-val { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--gold); letter-spacing: 0.02em; }
.hu-details {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-strong);
}
.hu-details-col { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.hu-details-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--text-muted);
}
.hu-detail-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) auto;
  gap: 10px;
  padding: 9px 10px;
  background: rgba(0,0,0,0.22);
  border: 1px solid var(--border-strong);
}
.hu-detail-active { border-left: 3px solid var(--primary); }
.hu-detail-ended { border-left: 3px solid var(--text-dim); }
.hu-detail-main { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.hu-detail-main strong { font-family: var(--font-display); font-size: 14px; color: var(--text); overflow-wrap: anywhere; }
.hu-detail-main span { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
.hu-detail-meta { display: flex; align-items: flex-end; flex-direction: column; gap: 4px; text-align: right; }
.hu-detail-meta span {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  white-space: nowrap;
}
.hu-pay { padding: 2px 6px; border: 1px solid currentColor; font-weight: 700; }
.hu-pay-ok { color: #84cc16 !important; background: rgba(132,204,22,0.08); }
.hu-pay-pending { color: var(--gold) !important; background: rgba(212,168,71,0.08); }
.hu-pay-wait { color: var(--primary) !important; background: rgba(193,39,45,0.08); }
.hu-empty {
  padding: 14px 10px;
  border: 1px dashed var(--border-strong);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
}
@media (max-width: 980px) {
  .hu-head { padding-right: 0; }
  .hu-view-btn { position: relative; margin-top: 10px; width: 100%; }
  .hu-details { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  .hu-detail-row { grid-template-columns: 1fr; }
  .hu-detail-meta { align-items: flex-start; text-align: left; }
}

/* =================================================================
   TABLE FILTERS
   ================================================================= */
.rt-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.rt-filter {
  background: transparent;
  border: 1px solid var(--border-strong);
  color: var(--text-muted);
  padding: 7px 14px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.16em;
  cursor: pointer;
  transition: all 0.15s;
}
.rt-filter:hover { color: var(--text); border-color: var(--border-bright); }
.rt-filter.is-active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 12px rgba(193,39,45,0.4);
}

/* =================================================================
   TABELA
   ================================================================= */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px 0 4px;
  margin-bottom: 28px;
}
.table-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 24px 16px;
  border-bottom: 1px solid var(--border);
}
.table-head h2 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.18em;
  color: var(--text);
}
.table-head p {
  margin: 4px 0 0;
  font-size: 13px;
  color: var(--text-muted);
}
.table-mode-badge {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 0.24em;
  color: var(--primary);
  border: 1px solid var(--primary);
  padding: 6px 14px;
}

.table-wrap { overflow-x: auto; }
.ranktable {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.ranktable thead th {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  text-align: left;
  padding: 14px 12px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.ranktable thead th.col-num { text-align: right; }
.ranktable .col-rank { width: 60px; padding-left: 24px; }
.ranktable .col-nick { width: 30%; }

.ranktable tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.ranktable tbody tr:hover { background: var(--surface-2); }
.ranktable tbody tr:last-child { border-bottom: none; }
.ranktable td { padding: 14px 12px; }
.ranktable td.col-num { text-align: right; }
.ranktable td.mono {
  font-family: var(--font-mono);
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.04em;
}
.ranktable .col-rank { padding-left: 24px; }
.ranktable .col-num:last-child { padding-right: 24px; }

.rank-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 14px;
  min-width: 30px;
  text-align: center;
  padding: 4px 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.rank-pill.rank-1 { color: var(--gold);   border-color: var(--gold);   background: rgba(201,165,92,0.08); }
.rank-pill.rank-2 { color: var(--silver); border-color: var(--silver); background: rgba(166,161,149,0.08); }
.rank-pill.rank-3 { color: var(--bronze); border-color: var(--bronze); background: rgba(184,116,58,0.08); }

.nick {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--text);
}
.nick-tag {
  display: inline-block;
  margin-left: 8px;
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 2px 6px;
  vertical-align: middle;
}

.accent { color: var(--primary) !important; }

/* =================================================================
   SAFEZONE
   ================================================================= */
/* — section wrapper ------------------------------------------------ */
.sz-section { margin-bottom: 28px; }
.sz-section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}
.sz-section-eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.28em; color: var(--text-dim); margin-bottom: 6px; }
.sz-section-eyebrow-line { width: 28px; height: 1px; background: var(--primary); }
.sz-section-title { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: 0.02em; color: var(--text); line-height: 1; }
.sz-section-acc { color: var(--primary); opacity: 0.7; }
.sz-section-badge { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.26em; color: var(--primary); border: 1px solid var(--primary); background: rgba(193,39,45,0.08); padding: 5px 12px; }
.sz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding-top: 12px; }
@media (max-width: 760px) { .sz-grid { grid-template-columns: 1fr; } }

/* — card base ------------------------------------------------------ */
.sz {
  position: relative;
  background: linear-gradient(180deg, var(--surface-3) 0%, var(--surface-2) 100%);
  border: 1px solid var(--border-strong);
  padding: 18px 20px;
  overflow: visible;
  clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}
.sz::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--primary);
  box-shadow: 0 0 14px var(--primary);
}
.sz-glow {
  position: absolute;
  top: -30px; right: -30px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(193,39,45,0.18) 0%, transparent 65%);
  pointer-events: none;
}
.sz > * { position: relative; z-index: 1; }

/* — player row ----------------------------------------------------- */
.sz-player {
  display: flex;
  align-items: flex-end;
  margin: 10px 0 12px;
  padding: 10px 12px 10px 14px;
  background: linear-gradient(90deg, rgba(193,39,45,0.10) 0%, transparent 100%);
  border: 1px solid rgba(193,39,45,0.25);
  border-left: 3px solid var(--primary);
}
.sz .ls-player-nick { font-size: 22px; }
.sz-player-l { display: flex; flex-direction: column; gap: 3px; }
.sz-player-meta { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text-muted); }
.sz-player-meta > span:first-child { background: var(--bg-2); border: 1px solid var(--border-strong); padding: 2px 6px; color: var(--text); letter-spacing: 0.14em; }
.sz-player-sep { width: 3px; height: 3px; background: var(--text-very-dim); border-radius: 50%; }

/* — vault display -------------------------------------------------- */
.sz-vault {
  position: relative;
  padding: 14px 18px 12px;
  background: linear-gradient(180deg, #0a0805 0%, #06040a 100%);
  border: 1px solid var(--border-strong);
  box-shadow: inset 0 0 0 1px rgba(193,39,45,0.22), inset 0 0 60px rgba(0,0,0,0.7), 0 4px 24px rgba(0,0,0,0.4), 0 0 30px rgba(193,39,45,0.15);
  overflow: hidden;
  clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
}
.sz-vault-bg { position: absolute; inset: 0; color: var(--primary); opacity: 0.08; pointer-events: none; }
.sz-vault > *:not(.sz-vault-bg) { position: relative; z-index: 1; }

/* — AZUL override (safezone usa --primary: #2da9c1) --------------- */
.sz-section {
  --primary: #2da9c1;
}
.sz-section-badge { color: #2da9c1; border-color: #2da9c1; background: rgba(45,169,193,0.12); }
.sz-section-eyebrow-line { background: #2da9c1; }
.sz-section-acc { color: #2da9c1; }
.sz::before { background: #2da9c1; box-shadow: 0 0 14px #2da9c1; }
.sz-glow { background: radial-gradient(circle, rgba(45,169,193,0.22) 0%, transparent 65%); }
.sz .ls-eyebrow { color: #2da9c1; }
.sz .ls-eyebrow-dot { background: #2da9c1; box-shadow: 0 0 6px #2da9c1; }
.sz-player {
  background: linear-gradient(90deg, rgba(45,169,193,0.14) 0%, transparent 100%);
  border-color: rgba(45,169,193,0.32);
  border-left-color: #2da9c1;
}
.sz-player .ls-player-pre { color: #2da9c1; }
.sz-player .ls-player-pre-line { background: #2da9c1; box-shadow: 0 0 4px #2da9c1; }
.sz .ls-player-nick { text-shadow: 0 0 24px rgba(45,169,193,0.45); }
.sz-vault {
  background: linear-gradient(180deg, #050a0d 0%, #02060a 100%);
  box-shadow: inset 0 0 0 1px rgba(45,169,193,0.28), inset 0 0 60px rgba(0,0,0,0.7), 0 4px 24px rgba(0,0,0,0.4), 0 0 30px rgba(45,169,193,0.18);
}
.sz-vault-bg { color: #2da9c1; opacity: 0.12; }
.sz-vault-head { border-bottom: 1px dashed rgba(45,169,193,0.32); }
.sz-vault-head-dot { background: #2da9c1; box-shadow: 0 0 8px #2da9c1; }
.sz-vault-head-lbl { color: #2da9c1; }
.sz-vault-currency { color: #2da9c1; text-shadow: 0 0 8px #2da9c1, 0 0 18px rgba(45,169,193,0.65); }
.sz-vault-num { text-shadow: 0 0 14px rgba(45,169,193,0.55), 0 0 30px rgba(45,169,193,0.35); }

/* — $ flutuante --------------------------------------------------- */
.sz-dollar {
  position: absolute;
  top: -18px; left: -18px;
  z-index: 5;
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 26px;
  color: #2da9c1;
  background: radial-gradient(circle at 35% 30%, rgba(45,169,193,0.28) 0%, transparent 60%), var(--bg);
  border: 2px solid #2da9c1;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.45), 0 0 22px rgba(45,169,193,0.7), 0 4px 10px rgba(0,0,0,0.5);
  text-shadow: 0 0 8px #2da9c1;
  letter-spacing: 0; line-height: 1; padding-bottom: 2px;
}
.sz-vault-head { display: flex; align-items: center; gap: 8px; padding-bottom: 8px; margin-bottom: 10px; border-bottom: 1px dashed rgba(45,169,193,0.32); }
.sz-vault-head-dot { width: 7px; height: 7px; background: #2da9c1; border-radius: 50%; box-shadow: 0 0 8px #2da9c1; animation: pulse 1.6s infinite; }
.sz-vault-head-lbl { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.28em; color: #2da9c1; }
.sz-vault-currency { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: #2da9c1; letter-spacing: 0.04em; text-shadow: 0 0 8px #2da9c1, 0 0 18px rgba(45,169,193,0.6); }
.sz-vault-num { font-family: var(--font-display); font-weight: 700; font-size: 50px; line-height: 0.85; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; text-shadow: 0 0 14px rgba(45,169,193,0.55), 0 0 30px rgba(45,169,193,0.35); }
.sz-vault-cents { font-family: var(--font-mono); font-size: 16px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.04em; margin-left: 2px; text-shadow: none; }
.sz-vault-display { display: flex; align-items: baseline; gap: 10px; padding: 4px 0; position: relative; }
.sz-vault-display::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.16) 2px, rgba(0,0,0,0.16) 3px); pointer-events: none; z-index: 2; }

/* =================================================================
   KILL FEED — toggle + painel colapsável
   ================================================================= */
.kf-toggle {
  position: fixed;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  z-index: 60;
  background: linear-gradient(180deg, var(--primary) 0%, #8a1a1f 100%);
  border: none;
  color: #fff;
  padding: 0;
  cursor: pointer;
  font-family: inherit;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    inset 0 -2px 0 rgba(0,0,0,0.25),
    -4px 0 20px rgba(193,39,45,0.45),
    -12px 0 40px rgba(0,0,0,0.5);
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s, right 0.3s ease;
  clip-path: polygon(0 14px, 16px 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 14px));
}
.kf-toggle:hover {
  transform: translateY(-50%) translateX(-6px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.25),
    -6px 0 30px rgba(193,39,45,0.75),
    -14px 0 50px rgba(0,0,0,0.6);
}
.kf-toggle.is-open { right: 380px; }
@media (max-width: 540px) { .kf-toggle.is-open { right: 92vw; } }
.kf-toggle.has-unread { animation: kf-bump 1.4s infinite; }
@keyframes kf-bump {
  0%, 100% { transform: translateY(-50%); }
  50%      { transform: translateY(-50%) translateX(-3px); }
}

.kf-toggle-inner {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "live  arrow"
    "title arrow";
  align-items: center;
  gap: 4px 12px;
  padding: 12px 16px 12px 18px;
  min-width: 130px;
}
.kf-toggle-live {
  grid-area: live;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: rgba(255,255,255,0.92);
}
.kf-toggle-dot {
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 10px #fff, 0 0 0 3px rgba(255,255,255,0.18);
  animation: pulse-white 1.2s infinite;
}
@keyframes pulse-white {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
.kf-toggle-title {
  grid-area: title;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  line-height: 0.9;
  letter-spacing: 0.025em;
  color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.kf-toggle-title em { font-style: normal; opacity: 0.85; font-weight: 600; }
.kf-toggle-arrow {
  grid-area: arrow;
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 44px;
  background: rgba(0,0,0,0.25);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.22);
}
.kf-toggle-badge {
  position: absolute;
  top: -10px; left: -12px;
  background: #fff;
  color: var(--primary);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  padding: 4px 9px;
  border-radius: 99px;
  box-shadow: 0 0 12px rgba(255,255,255,0.65), 0 0 0 2px var(--primary), 0 2px 6px rgba(0,0,0,0.4);
  min-width: 28px;
  text-align: center;
  animation: kf-badge-pop 0.4s ease;
  letter-spacing: 0.02em;
  z-index: 2;
}
@keyframes kf-badge-pop {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.kf-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 55;
  animation: kf-overlay-in 0.2s ease;
}
@keyframes kf-overlay-in { from { opacity: 0; } to { opacity: 1; } }

.kf-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 380px;
  height: 100vh;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
  border-left: 1px solid var(--primary);
  box-shadow: -1px 0 0 rgba(193,39,45,0.4), -20px 0 60px rgba(0,0,0,0.5);
  z-index: 58;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.kf-panel.is-open { transform: translateX(0); }
@media (max-width: 540px) { .kf-panel { width: 92vw; } }

.kf-hdr { padding: 18px 22px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
.kf-hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.kf-hdr-right { display: flex; align-items: center; gap: 12px; }
.kf-live { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.24em; color: var(--primary); }
.kf-live-dot { width: 9px; height: 9px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); animation: pulse-red 1.2s infinite; }
.kf-counter { display: flex; align-items: baseline; gap: 4px; }
.kf-counter-pre { font-family: var(--font-display); font-weight: 500; font-size: 9px; letter-spacing: 0.22em; color: var(--text-dim); margin-right: 4px; }
.kf-counter-num { font-family: var(--font-mono); font-size: 14px; color: var(--text); }
.kf-counter-unit { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.kf-close, .kf-search-toggle {
  background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted);
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.kf-close:hover, .kf-search-toggle:hover, .kf-search-toggle.is-active { color: var(--text); border-color: var(--primary); background: rgba(193,39,45,0.12); }

.kf-title { margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: 0.02em; color: var(--text); line-height: 0.95; }
.kf-title-acc { color: var(--primary); font-size: 20px; opacity: 0.7; margin-left: 6px; }
.kf-sub { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); }
.kf-sub-sep { width: 3px; height: 3px; background: var(--text-dim); border-radius: 50%; }
.kf-filter {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 12px;
  padding: 3px;
  background: rgba(0,0,0,0.26);
  border: 1px solid var(--border-strong);
}
.kf-filter-btn {
  min-height: 28px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.kf-filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }
.kf-filter-btn.is-active {
  color: #fff;
  background: rgba(193,39,45,0.18);
  border-color: rgba(193,39,45,0.65);
  box-shadow: inset 3px 0 0 var(--primary), 0 0 14px rgba(193,39,45,0.16);
}
.kf-filter-btn:nth-child(2).is-active {
  background: rgba(132,204,22,0.14);
  border-color: rgba(132,204,22,0.58);
  box-shadow: inset 3px 0 0 #84cc16, 0 0 14px rgba(132,204,22,0.14);
}
.kf-search {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding: 7px 8px;
  background: rgba(0,0,0,0.28);
  border: 1px solid var(--border-strong);
  color: var(--text-dim);
}
.kf-search input {
  min-width: 0;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.kf-search input::placeholder { color: var(--text-dim); }
.kf-search button {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
}
.kf-search button:hover { color: var(--text); border-color: var(--border-strong); }

.kf-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 8px 10px; }
.kf-list::-webkit-scrollbar { width: 4px; }
.kf-list::-webkit-scrollbar-thumb { background: var(--border-strong); }

.kf-row {
  position: relative;
  display: flex;
  gap: 12px;
  padding: 11px 12px;
  margin: 0 0 7px;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012) 52%, rgba(0,0,0,0.10)),
    rgba(6,8,9,0.72);
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow:
    inset 3px 0 0 rgba(255,255,255,0.16),
    0 8px 20px rgba(0,0,0,0.18);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.kf-row::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(90deg, currentColor, transparent 34%);
  opacity: 0.06;
}
.kf-row.pvp { color: var(--primary); box-shadow: inset 3px 0 0 rgba(193,39,45,0.82), 0 8px 20px rgba(0,0,0,0.18); }
.kf-row.pve { color: #84cc16; box-shadow: inset 3px 0 0 rgba(132,204,22,0.78), 0 8px 20px rgba(0,0,0,0.18); }
.kf-row.is-bounty-kill {
  color: var(--gold);
  background:
    linear-gradient(90deg, rgba(212,168,71,0.18), rgba(193,39,45,0.07) 46%, rgba(0,0,0,0.12)),
    rgba(12,9,5,0.86);
  border-color: rgba(212,168,71,0.36);
  box-shadow:
    inset 3px 0 0 var(--gold),
    0 0 0 1px rgba(212,168,71,0.12),
    0 10px 24px rgba(0,0,0,0.22);
}
.kf-row.suicide {
  color: #f97316;
  background:
    linear-gradient(90deg, rgba(249,115,22,0.13), rgba(255,255,255,0.018) 50%, rgba(0,0,0,0.12)),
    rgba(10,8,6,0.82);
  border-color: rgba(249,115,22,0.20);
  box-shadow: inset 3px 0 0 rgba(249,115,22,0.84), 0 8px 20px rgba(0,0,0,0.18);
}
.kf-row:hover {
  background:
    linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.018) 52%, rgba(0,0,0,0.08)),
    rgba(10,13,14,0.86);
  border-color: rgba(255,255,255,0.12);
  transform: translateX(2px);
}
.kf-row.kf-new { animation: kf-flash 1.8s ease-out; }
@keyframes kf-flash {
  0% { background: rgba(193,39,45,0.32); transform: translateX(-12px); opacity: 0; }
  18% { transform: translateX(0); opacity: 1; }
  100% { background: rgba(6,8,9,0.72); }
}

.kf-rail { display: flex; flex-direction: column; align-items: center; padding-top: 6px; width: 12px; }
.kf-rail-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); border: 1px solid var(--border-strong); }
.kf-row.pvp .kf-rail-dot { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 6px var(--primary); }
.kf-row.pve .kf-rail-dot { background: #84cc16; border-color: #84cc16; box-shadow: 0 0 6px #84cc16; }
.kf-row.is-bounty-kill .kf-rail-dot { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 9px var(--gold); }
.kf-row.suicide .kf-rail-dot { background: #f97316; border-color: #f97316; box-shadow: 0 0 7px #f97316; }
.kf-rail-line { flex: 1; width: 1px; background: linear-gradient(180deg, var(--border-strong), transparent); margin-top: 4px; }

.kf-body { position: relative; z-index: 1; flex: 1; min-width: 0; color: var(--text); }
.kf-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.kf-time {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 2px 7px;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.065), rgba(255,255,255,0.015)),
    rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 2px 0 0 currentColor;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}
.kf-row.pvp .kf-time { color: var(--primary); border-color: rgba(193,39,45,0.28); background-color: rgba(193,39,45,0.08); }
.kf-row.pve .kf-time { color: #84cc16; border-color: rgba(132,204,22,0.24); background-color: rgba(132,204,22,0.07); }
.kf-tag { font-family: var(--font-display); font-weight: 600; font-size: 9px; letter-spacing: 0.2em; padding: 1px 5px; border: 1px solid; }
.kf-tag.pvp { color: var(--primary); border-color: rgba(193,39,45,0.55); }
.kf-tag.pve { color: #84cc16; border-color: rgba(132,204,22,0.55); }
.kf-tag.suicide { color: #f97316; border-color: rgba(249,115,22,0.58); background: rgba(249,115,22,0.08); }
.kf-bounty-tag {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 2px 7px;
  color: var(--gold);
  background: rgba(212,168,71,0.11);
  border: 1px solid rgba(212,168,71,0.42);
  box-shadow: inset 2px 0 0 var(--gold);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 0.16em;
}
.kf-hs { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 9px; color: #f5c842; }

.kf-dist-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-height: 20px;
  padding: 2px 7px 2px 6px;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.07), rgba(255,255,255,0.015)),
    rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 2px 0 0 currentColor;
  text-transform: uppercase;
  white-space: nowrap;
}
.kf-dist-icon { display: flex; opacity: 0.95; }
.kf-dist-icon svg { width: 9px; height: 9px; }
.kf-dist-num { font-family: var(--font-mono); font-weight: 700; font-size: 10px; color: var(--text); letter-spacing: 0.08em; line-height: 1; }
.kf-dist-num i { font-style: normal; font-size: 8px; color: currentColor; margin-left: 2px; opacity: 0.82; }

.kf-dist-badge.tier-close   { color: #9ca3af; }
.kf-dist-badge.tier-mid     { color: #84cc16; border-color: rgba(132,204,22,0.24); background-color: rgba(132,204,22,0.07); }
.kf-dist-badge.tier-long    { color: #f5c842; border-color: rgba(245,200,66,0.28); background-color: rgba(245,200,66,0.08); }
.kf-dist-badge.tier-extreme { color: var(--primary); border-color: rgba(193,39,45,0.34); background-color: rgba(193,39,45,0.10); }

.kf-line { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; font-family: var(--font-display); font-weight: 600; font-size: 13px; line-height: 1.1; }
.kf-killer { color: var(--text); }
.kf-wpn { display: inline-flex; align-items: center; gap: 4px; color: var(--primary); padding: 2px 6px; background: rgba(193,39,45,0.10); border: 1px solid rgba(193,39,45,0.35); font-family: var(--font-mono); font-size: 9px; font-weight: 500; }
.kf-line-suicide { color: var(--text); }
.kf-suicide-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  color: #f97316;
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.38);
}
.kf-suicide-text {
  color: #f97316;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.kf-wpn-muted {
  color: #d6a071;
  background: rgba(249,115,22,0.08);
  border-color: rgba(249,115,22,0.26);
}
.kf-victim { color: var(--text-muted); }
.kf-victim.is-npc { color: #84cc16; }

.kf-foot-bar { display: flex; justify-content: space-between; align-items: center; padding: 11px 20px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); background: var(--bg-2); }
.kf-foot-l { display: inline-flex; align-items: center; gap: 8px; }
.kf-foot-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 6px var(--primary); }

/* =================================================================
   FOOTER
   ================================================================= */
.page-foot {
  text-align: center;
  padding: 30px 0 10px;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
}
.page-foot-line {
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.page-foot-dot {
  width: 4px; height: 4px;
  background: var(--text-dim);
  border-radius: 50%;
}

/* =================================================================
   MISC UTILITIES
   ================================================================= */
.no-data { padding: 24px 0; color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; }
.accent-blue { color: #2da9c1 !important; }

/* =================================================================
   BOUNTY SECTION
   ================================================================= */
.bounty-section { margin-top: 18px; }
.bounty-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
@media (max-width: 760px) { .bounty-grid { grid-template-columns: 1fr; } }
.bounty-card {
  position: relative;
  overflow: hidden;
  min-height: 180px;
  padding: 18px;
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid var(--border);
  border-radius: 2px;
}
.bounty-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: linear-gradient(135deg, transparent 49%, var(--border) 49%, var(--border) 51%, transparent 51%);
  background-size: 18px 18px;
  opacity: 0.08;
  pointer-events: none;
}
.bounty-card-hot { border-color: rgba(214,38,45,0.5); box-shadow: inset 0 0 0 1px rgba(214,38,45,0.08); }
.bounty-target { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.bounty-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--text-dim); }
.bounty-target strong { font-family: var(--font-display); font-size: 34px; line-height: 0.95; color: var(--text); overflow-wrap: anywhere; }
.bounty-target span:last-child { font-family: var(--font-cond); font-size: 13px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; }
.bounty-value {
  position: relative; z-index: 1; margin-top: 22px;
  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.bounty-value span, .bounty-meta span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); }
.bounty-value strong { font-family: var(--font-display); font-size: 36px; line-height: 0.9; color: var(--primary); }
.bounty-meta { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
.bounty-meta span { padding: 5px 8px; border: 1px solid var(--border-strong); background: var(--bg-2); color: var(--text-muted); }

/* =================================================================
   RESPONSIVE
   ================================================================= */
@media (max-width: 720px) {
  .table-head { flex-direction: column; align-items: flex-start; gap: 10px; }
  .ranktable th, .ranktable td { padding: 10px 8px; font-size: 13px; }
  .col-rank { padding-left: 12px !important; }
  .col-num:last-child { padding-right: 12px !important; }
}
</style>
