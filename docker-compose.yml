version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: brasilz-db
    restart: always
    environment:
      POSTGRES_USER: brasilz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: brasilz_portal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brasilz -d brasilz_portal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - brasilz

  api:
    build: ./api
    container_name: brasilz-api
    restart: always
    environment:
      DATABASE_URL: postgres://brasilz:${DB_PASSWORD}@db:5432/brasilz_portal
      INGEST_API_KEY: ${INGEST_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brasilz

  nginx:
    image: nginx:alpine
    container_name: brasilz-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - brasilz

volumes:
  pgdata:

networks:
  brasilz:
    driver: bridge
